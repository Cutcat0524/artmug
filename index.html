    <button class="copy-btn" onclick="copyForm()">작성한 양식 복사하기</button>

<style>
* {
  box-sizing: border-box;
}

.cutcat-page {
  width: 100%;
  max-width: 980px;
  margin: 0 auto;
  padding: 40px 16px;
  background: #fff;
  font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
  color: #222;
}

.section-title {
  text-align: center;
  margin: 45px 0 24px;
}

.section-title img {
  max-width: 420px;
  width: 80%;
  height: auto;
  display: inline-block;
}

.portfolio-box {
  position: relative;
  width: 100%;
  min-height: 430px;
  padding: 44px 70px;
  border: 2px solid rgba(254,169,12,0.22);
  border-radius: 28px;
  background: #fff;
  box-shadow: 0 10px 35px rgba(0,0,0,0.04);
  overflow: hidden;
}

.cover-slider {
  position: relative;
  width: 100%;
  height: 330px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: pan-y;
}

.video-card {
  position: absolute;
  width: 210px;
  height: 300px;
  border-radius: 22px;
  background: #f8f8f8;
  border: 1px solid #f1f1f1;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.45s ease;
  box-shadow: 0 10px 24px rgba(0,0,0,0.12);
  opacity: 0.45;
  filter: blur(1.2px) grayscale(0.25);
  transform: scale(0.82);
  z-index: 1;
}

.video-card.active {
  opacity: 1;
  filter: none;
  transform: scale(1);
  z-index: 5;
  box-shadow: 0 16px 38px rgba(0,0,0,0.18);
}

.video-card.prev-card {
  transform: translateX(-230px) scale(0.82);
}

.video-card.next-card {
  transform: translateX(230px) scale(0.82);
}

.video-card.hide-left {
  transform: translateX(-430px) scale(0.72);
  opacity: 0;
  pointer-events: none;
}

.video-card.hide-right {
  transform: translateX(430px) scale(0.72);
  opacity: 0;
  pointer-events: none;
}

.video-card iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

.video-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  text-align: center;
  font-size: 18px;
  font-weight: 900;
  color: #444;
  background:
    linear-gradient(135deg, rgba(254,169,12,0.18), rgba(1,181,162,0.16)),
    #fff;
}

.slide-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border: 2px solid rgba(254,169,12,0.25);
  border-radius: 50%;
  background: #fff;
  color: #fea90c;
  font-size: 34px;
  line-height: 36px;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
}

.slide-btn:hover {
  background: #fff8ea;
}

.prev {
  left: 18px;
}

.next {
  right: 18px;
}

.form-box {
  width: 100%;
  padding: 38px 42px;
  border: 2px solid rgba(254,169,12,0.22);
  border-radius: 28px;
  background: #fff;
  box-shadow: 0 10px 35px rgba(0,0,0,0.04);
}

.form-box label {
  display: block;
  margin: 24px 0 9px;
  font-size: 16px;
  font-weight: 800;
  color: #222;
}

.form-box label:first-child {
  margin-top: 0;
}

.form-box span {
  margin-left: 6px;
  color: #01b5a2;
  font-size: 13px;
  font-weight: 700;
}

.form-box input {
  width: 100%;
  height: 44px;
  padding: 0 18px;
  border: 1px solid rgba(254,169,12,0.22);
  border-radius: 16px;
  background: #fffdf8;
  font-size: 14px;
  outline: none;
}

.form-box input:focus {
  border-color: #fea90c;
  box-shadow: 0 0 0 3px rgba(254,169,12,0.12);
}

.copy-btn {
  width: 100%;
  height: 56px;
  margin-top: 34px;
  border: 0;
  border-radius: 16px;
  background: #fea90c;
  color: #fff;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
}

.copy-btn:hover {
  filter: brightness(0.96);
}

@media (max-width: 700px) {
  .portfolio-box {
    min-height: 380px;
    padding: 34px 48px;
  }

  .cover-slider {
    height: 300px;
  }

  .video-card {
    width: 170px;
    height: 255px;
  }

  .video-card.prev-card {
    transform: translateX(-145px) scale(0.78);
  }

  .video-card.next-card {
    transform: translateX(145px) scale(0.78);
  }

  .video-card.hide-left {
    transform: translateX(-280px) scale(0.7);
  }

  .video-card.hide-right {
    transform: translateX(280px) scale(0.7);
  }

    padding: 30px 22px;
  }

  .slide-btn {
    width: 38px;
    height: 38px;
    font-size: 28px;
  }

</style>

<script>
const cards = Array.from(document.querySelectorAll(".video-card"));
let currentIndex = 1;

function updateCards() {
  cards.forEach((card, index) => {
    card.classList.remove("active", "prev-card", "next-card", "hide-left", "hide-right");

    if (index === currentIndex) {
      card.classList.add("active");
    } else if (index === currentIndex - 1) {
      card.classList.add("prev-card");
    } else if (index === currentIndex + 1) {
      card.classList.add("next-card");
    } else if (index < currentIndex) {
      card.classList.add("hide-left");
    } else {
      card.classList.add("hide-right");
    }
  });
}

function stopAllVideos() {
  cards.forEach(card => {
    const iframe = card.querySelector("iframe");
    if (iframe) {
      const url = card.getAttribute("data-url");
      card.innerHTML = `<div class="video-placeholder">영상 ${cards.indexOf(card) + 1}</div>`;
    }
  });
}

function moveSlide(direction) {
  currentIndex += direction;

  if (currentIndex < 0) {
    currentIndex = cards.length - 1;
  }

  if (currentIndex >= cards.length) {
    currentIndex = 0;
  }

  stopAllVideos();
  updateCards();
}

cards.forEach((card, index) => {
  card.addEventListener("click", function() {
    if (index !== currentIndex) {
      currentIndex = index;
      stopAllVideos();
      updateCards();
      return;
    }

    const url = this.getAttribute("data-url");

    if (!this.querySelector("iframe")) {
      this.innerHTML = `
        <iframe 
          src="${url}?autoplay=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      `;
    }
  });
});

const sliderArea = document.getElementById("coverSlider");

sliderArea.addEventListener("wheel", function(e) {
  e.preventDefault();

  if (e.deltaY > 0 || e.deltaX > 0) {
    moveSlide(1);
  } else {
    moveSlide(-1);
  }
}, { passive: false });

let startX = 0;

sliderArea.addEventListener("touchstart", function(e) {
  startX = e.touches[0].clientX;
});

sliderArea.addEventListener("touchend", function(e) {
  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX;

  if (Math.abs(diff) > 40) {
    if (diff > 0) {
      moveSlide(1);
    } else {
      moveSlide(-1);
    }
  }
});

function copyForm() {
  const text =
`1. 업로드 채널 링크
${document.getElementById("q1").value}

2. 영상 종류
${document.getElementById("q2").value}

3. 영상 주제
${document.getElementById("q3").value}

4. 편집점 유무
${document.getElementById("q4").value}

5. 영상 등장 인원수
${document.getElementById("q5").value}

6. 참고 영상 링크
${document.getElementById("q6").value}

7. 원하시는 영상 길이
${document.getElementById("q7").value}`;

  navigator.clipboard.writeText(text).then(() => {
    alert("문의 시 붙여넣기 해주세요");
  });
}

updateCards();
</script>
