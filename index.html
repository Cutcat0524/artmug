<div class="cutcat-page">

  <div class="section-title">
    <img src="신청.png" alt="신청양식">
  </div>

  <section class="form-box">

    <label>1. 업로드 채널 링크 <span>유튜브, 치지직 등</span></label>
    <input id="q1" placeholder="예: 유튜브 / 치지직 링크">

    <label>2. 영상 종류 <span>롱폼 / 쇼츠</span></label>
    <input id="q2" placeholder="예: 쇼츠">

    <label>3. 영상 주제 <span>게임, 저챗 등</span></label>
    <input id="q3" placeholder="예: 공포게임 / 저챗 / 합방">

    <label>4. 편집점 유무</label>
    <input id="q4" placeholder="예: 있음 / 없음">

    <label>5. 영상 등장 인원수</label>
    <input id="q5" placeholder="예: 1명 / 3명 / 4명">

    <label>6. 참고 영상 링크</label>
    <input id="q6" placeholder="원하시는 스타일의 영상 링크">

    <label>7. 원하시는 영상 길이</label>
    <input id="q7" placeholder="예: 1분 내외 / 10분 내외">

    <button type="button" class="copy-btn" onclick="copyForm()">작성한 양식 복사하기</button>

  </section>


  <div class="section-title">
    <img src="포폴.png" alt="포트폴리오">
  </div>

  <section class="portfolio-box">
    <button class="slide-btn prev" onclick="moveSlide(-1)">‹</button>
    <div class="cover-slider" id="coverSlider"></div>
    <button class="slide-btn next" onclick="moveSlide(1)">›</button>
  </section>

</div>

<style>
* {
  box-sizing: border-box;
}

.cutcat-page {
  width: 100%;
  max-width: 980px;
  margin: 0 auto;
  padding: 40px 16px;
  background: #fff;
  font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
  color: #222;
}

.section-title {
  text-align: center;
  margin: 45px 0 24px;
}

.section-title:first-child {
  margin-top: 0;
}

.section-title img {
  max-width: 420px;
  width: 80%;
  height: auto;
  display: inline-block;
}

.portfolio-box,
.form-box {
  width: 100%;
  border: 2px solid rgba(254,169,12,0.22);
  border-radius: 28px;
  background: #fff;
  box-shadow: 0 10px 35px rgba(0,0,0,0.04);
}

.portfolio-box {
  position: relative;
  min-height: 430px;
  padding: 44px 70px;
  overflow: hidden;
}

.cover-slider {
  position: relative;
  width: 100%;
  height: 330px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: pan-y;
}

.video-card {
  position: absolute;
  width: 210px;
  height: 300px;
  border-radius: 22px;
  background: #f8f8f8;
  border: 1px solid #f1f1f1;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.45s ease;
  box-shadow: 0 10px 24px rgba(0,0,0,0.12);
  opacity: 0;
  pointer-events: none;
  filter: blur(1.2px) grayscale(0.25);
  transform: scale(0.72);
  z-index: 1;
}

.video-card.active {
  opacity: 1;
  pointer-events: auto;
  filter: none;
  transform: translateX(0) scale(1);
  z-index: 5;
  box-shadow: 0 16px 38px rgba(0,0,0,0.18);
}

.video-card.prev-card {
  opacity: 0.45;
  pointer-events: auto;
  transform: translateX(-230px) scale(0.82);
  z-index: 2;
}

.video-card.next-card {
  opacity: 0.45;
  pointer-events: auto;
  transform: translateX(230px) scale(0.82);
  z-index: 2;
}

.video-card.hide-left {
  transform: translateX(-430px) scale(0.72);
  opacity: 0;
}

.video-card.hide-right {
  transform: translateX(430px) scale(0.72);
  opacity: 0;
}

.video-thumb {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  background: #fff8ea;
}

.play-icon {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 58px;
  height: 58px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: rgba(254,169,12,0.92);
  color: #fff;
  font-size: 24px;
  line-height: 58px;
  text-align: center;
  padding-left: 4px;
  font-weight: 900;
  box-shadow: 0 8px 20px rgba(0,0,0,0.18);
}

.video-card iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.slide-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border: 2px solid rgba(254,169,12,0.25);
  border-radius: 50%;
  background: #fff;
  color: #fea90c;
  font-size: 34px;
  line-height: 36px;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
}

.slide-btn:hover {
  background: #fff8ea;
}

.prev {
  left: 18px;
}

.next {
  right: 18px;
}

.form-box {
  padding: 38px 42px;
}

.form-box label {
  display: block;
  margin: 24px 0 9px;
  font-size: 16px;
  font-weight: 800;
  color: #222;
}

.form-box label:first-child {
  margin-top: 0;
}

.form-box span {
  margin-left: 6px;
  color: #01b5a2;
  font-size: 13px;
  font-weight: 700;
}

.form-box input {
  width: 100%;
  height: 44px;
  padding: 0 18px;
  border: 1px solid rgba(254,169,12,0.22);
  border-radius: 16px;
  background: #fffdf8;
  font-size: 14px;
  outline: none;
}

.form-box input:focus {
  border-color: #fea90c;
  box-shadow: 0 0 0 3px rgba(254,169,12,0.12);
}

.copy-btn {
  width: 100%;
  height: 56px;
  margin-top: 34px;
  border: 0;
  border-radius: 16px;
  background: #fea90c;
  color: #fff;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
}

.copy-btn:hover {
  filter: brightness(0.96);
}

@media (max-width: 700px) {
  .portfolio-box {
    min-height: 380px;
    padding: 34px 48px;
  }

  .cover-slider {
    height: 300px;
  }

  .video-card {
    width: 170px;
    height: 255px;
  }

  .video-card.prev-card {
    transform: translateX(-145px) scale(0.78);
  }

  .video-card.next-card {
    transform: translateX(145px) scale(0.78);
  }

  .video-card.hide-left {
    transform: translateX(-280px) scale(0.7);
  }

  .video-card.hide-right {
    transform: translateX(280px) scale(0.7);
  }

  .form-box {
    padding: 30px 22px;
  }

  .slide-btn {
    width: 38px;
    height: 38px;
    font-size: 28px;
  }
}
</style>

<script>
const portfolioVideos = [
  "HT30gZN2Qrg",
  "9Ha-4xZaA6w",
  "WAgOGEd_LXM"
];

const sliderArea = document.getElementById("coverSlider");
let currentIndex = 0;
let cards = [];

function createVideoCards() {
  sliderArea.innerHTML = "";

  portfolioVideos.forEach((id, index) => {
    const card = document.createElement("div");
    card.className = "video-card";
    card.setAttribute("data-id", id);

    card.innerHTML = `
      <img class="video-thumb" src="https://i.ytimg.com/vi/${id}/hqdefault.jpg" alt="영상 ${index + 1}">
      <div class="play-icon">▶</div>
    `;

    card.addEventListener("click", function() {
      const clickedIndex = cards.indexOf(card);

      if (clickedIndex !== currentIndex) {
        currentIndex = clickedIndex;
        stopAllVideos();
        updateCards();
        return;
      }

      playVideo(card);
    });

    sliderArea.appendChild(card);
  });

  cards = Array.from(document.querySelectorAll(".video-card"));
}

function makeThumb(card) {
  const id = card.getAttribute("data-id");
  const number = cards.indexOf(card) + 1;

  card.innerHTML = `
    <img class="video-thumb" src="https://i.ytimg.com/vi/${id}/hqdefault.jpg" alt="영상 ${number}">
    <div class="play-icon">▶</div>
  `;
}

function playVideo(card) {
  const id = card.getAttribute("data-id");

  if (!card.querySelector("iframe")) {
    card.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    `;
  }
}

function stopAllVideos() {
  cards.forEach(card => {
    if (card.querySelector("iframe")) {
      makeThumb(card);
    }
  });
}

function getPosition(index) {
  const total = cards.length;
  let diff = index - currentIndex;

  if (diff > total / 2) diff -= total;
  if (diff < -total / 2) diff += total;

  return diff;
}

function updateCards() {
  cards.forEach((card, index) => {
    card.classList.remove("active", "prev-card", "next-card", "hide-left", "hide-right");

    const pos = getPosition(index);

    if (pos === 0) {
      card.classList.add("active");
    } else if (pos === -1) {
      card.classList.add("prev-card");
    } else if (pos === 1) {
      card.classList.add("next-card");
    } else if (pos < 0) {
      card.classList.add("hide-left");
    } else {
      card.classList.add("hide-right");
    }
  });
}

function moveSlide(direction) {
  if (cards.length <= 1) return;

  currentIndex += direction;

  if (currentIndex < 0) currentIndex = cards.length - 1;
  if (currentIndex >= cards.length) currentIndex = 0;

  stopAllVideos();
  updateCards();
}

sliderArea.addEventListener("wheel", function(e) {
  e.preventDefault();

  if (e.deltaY > 0 || e.deltaX > 0) {
    moveSlide(1);
  } else {
    moveSlide(-1);
  }
}, { passive: false });

let startX = 0;

sliderArea.addEventListener("touchstart", function(e) {
  startX = e.touches[0].clientX;
});

sliderArea.addEventListener("touchend", function(e) {
  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX;

  if (Math.abs(diff) > 40) {
    if (diff > 0) {
      moveSlide(1);
    } else {
      moveSlide(-1);
    }
  }
});

function copyForm() {
  const text =
`1. 업로드 채널 링크
${document.getElementById("q1").value}

2. 영상 종류
${document.getElementById("q2").value}

3. 영상 주제
${document.getElementById("q3").value}

4. 편집점 유무
${document.getElementById("q4").value}

5. 영상 등장 인원수
${document.getElementById("q5").value}

6. 참고 영상 링크
${document.getElementById("q6").value}

7. 원하시는 영상 길이
${document.getElementById("q7").value}`;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(function() {
      alert("복사되었습니다. 문의 시 붙여넣기 해주세요.");
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "0";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand("copy");
    alert("복사되었습니다. 문의 시 붙여넣기 해주세요.");
  } catch (err) {
    alert("자동 복사가 안 되었습니다. 입력하신 내용을 직접 드래그해서 복사해주세요.");
  }

  document.body.removeChild(textarea);
}

createVideoCards();
updateCards();
</script>
