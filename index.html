<div class="cutcat-page">

  <div class="cutcat-section portfolio-area">
    <div class="section-title">
      <img src="포폴.png" alt="포트폴리오">
    </div>

    <section class="portfolio-box">
      <button class="slide-btn prev" onclick="moveSlide(-1)">‹</button>
      <div class="cover-slider" id="coverSlider"></div>
      <button class="slide-btn next" onclick="moveSlide(1)">›</button>
    </section>
  </div>


  <div class="cutcat-section form-area">
    <div class="section-title">
      <img src="신청.png" alt="신청양식">
    </div>

    <section class="form-box">

      <div class="form-row">
        <div class="field">
          <label>업로드 채널 링크</label>
          <input id="q1" placeholder="예: 유튜브 / 치지직 링크">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>영상 종류</label>
          <div class="choice-wrap" data-target="q2" data-etc="q2_etc">
            <button type="button" onclick="selectChoice(this)">쇼츠</button>
            <button type="button" onclick="selectChoice(this)">롱폼</button>
            <button type="button" onclick="selectChoice(this)">기타</button>
          </div>
          <input id="q2" type="hidden">
          <input id="q2_etc" class="etc-input" placeholder="기타 내용을 입력해주세요">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>영상 주제</label>
          <input id="q3" placeholder="예: 공포게임 / 저챗 / 합방">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>편집점 유무</label>
          <div class="choice-wrap" data-target="q4" data-etc="q4_etc">
            <button type="button" onclick="selectChoice(this)">있음</button>
            <button type="button" onclick="selectChoice(this)">없음</button>
            <button type="button" onclick="selectChoice(this)">기타</button>
          </div>
          <input id="q4" type="hidden">
          <input id="q4_etc" class="etc-input" placeholder="기타 내용을 입력해주세요">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>영상 등장 인원수</label>
          <div class="choice-wrap" data-target="q5" data-etc="q5_etc">
            <button type="button" onclick="selectChoice(this)">1명</button>
            <button type="button" onclick="selectChoice(this)">2명</button>
            <button type="button" onclick="selectChoice(this)">3명</button>
            <button type="button" onclick="selectChoice(this)">4명 이상</button>
            <button type="button" onclick="selectChoice(this)">기타</button>
          </div>
          <input id="q5" type="hidden">
          <input id="q5_etc" class="etc-input" placeholder="기타 내용을 입력해주세요">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>요청사항</label>
          <input id="q6" placeholder="요청사항을 편하게 적어주세요">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>원하시는 영상 길이</label>
          <div class="choice-wrap" data-target="q7" data-etc="q7">
            <button type="button" onclick="selectChoice(this)">30초 내외</button>
            <button type="button" onclick="selectChoice(this)">1분 내외</button>
            <button type="button" onclick="selectChoice(this)">5분 내외</button>
            <button type="button" onclick="selectChoice(this)">10분 내외</button>
            <button type="button" onclick="selectChoice(this)">기타</button>
          </div>
          <input id="q7" class="etc-input" placeholder="기타 또는 직접 입력">
        </div>
      </div>

      <button type="button" class="copy-btn" onclick="copyForm()">작성한 양식 복사하기</button>

    </section>
  </div>

</div>

<style>
* {
  box-sizing: border-box;
}

.cutcat-page {
  width: 100%;
  max-width: 1040px;
  margin: 0 auto;
  padding: 42px 16px 54px;
  background: #fff;
  font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
  color: #222;
}

.cutcat-section {
  position: relative;
  margin-bottom: 95px;
}

.cutcat-section:last-child {
  margin-bottom: 0;
}

.section-title {
  text-align: center;
  margin: 0 0 24px;
}

.section-title img {
  max-width: 410px;
  width: 78%;
  height: auto;
  display: inline-block;
}

.form-box {
  position: relative;
  width: 100%;
  padding: 30px;
  border: 2px solid rgba(254,169,12,0.26);
  border-radius: 20px;
  background:
    linear-gradient(180deg, rgba(255,253,248,0.96), rgba(255,255,255,0.98));
  box-shadow: 0 18px 45px rgba(0,0,0,0.06);
}

.form-row {
  margin-bottom: 14px;
}

.field {
  padding: 16px 18px;
  border: 1px solid rgba(254,169,12,0.2);
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.035);
}

.field label {
  display: block;
  margin: 0 0 10px;
  font-size: 15px;
  font-weight: 900;
  color: #222;
}

.field input {
  width: 100%;
  height: 44px;
  padding: 0 15px;
  border: 1px solid rgba(254,169,12,0.25);
  border-radius: 12px;
  background: #fffdf8;
  font-size: 14px;
  outline: none;
}

.field input:focus {
  border-color: #fea90c;
  box-shadow: 0 0 0 4px rgba(254,169,12,0.13);
}

.choice-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.choice-wrap button {
  min-height: 38px;
  padding: 0 15px;
  border: 1px solid rgba(254,169,12,0.34);
  border-radius: 999px;
  background: #fffdf8;
  color: #333;
  font-size: 13px;
  font-weight: 850;
  cursor: pointer;
}

.choice-wrap button:hover {
  background: #fff8ea;
}

.choice-wrap button.selected {
  background: #fea90c;
  color: #fff;
  border-color: #fea90c;
  box-shadow: 0 7px 16px rgba(254,169,12,0.24);
}

.etc-input {
  display: none;
  margin-top: 10px;
}

.etc-input.show {
  display: block;
}

.copy-btn {
  width: 100%;
  height: 58px;
  margin-top: 26px;
  border: 0;
  border-radius: 16px;
  background: #fea90c;
  color: #fff;
  font-size: 17px;
  font-weight: 950;
  cursor: pointer;
  box-shadow: 0 10px 22px rgba(254,169,12,0.24);
}

.copy-btn:hover {
  filter: brightness(0.96);
}

.portfolio-box {
  position: relative;
  width: 100%;
  min-height: 440px;
  padding: 48px 78px;
  border: 2px solid rgba(254,169,12,0.26);
  border-radius: 14px 34px 14px 34px;
  background: rgba(255,255,255,0.96);
  box-shadow: 0 18px 45px rgba(0,0,0,0.06);
  overflow: hidden;
}

.portfolio-box:before {
  content: "";
  position: absolute;
  inset: 14px;
  border: 1px dashed rgba(254,169,12,0.28);
  border-radius: inherit;
  pointer-events: none;
}

.cover-slider {
  position: relative;
  width: 100%;
  height: 335px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: pan-y;
  z-index: 2;
}

.video-card {
  position: absolute;
  width: 220px;
  height: 305px;
  border-radius: 28px 10px 28px 10px;
  background: #f8f8f8;
  border: 2px solid rgba(255,255,255,0.9);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.45s ease;
  box-shadow: 0 14px 26px rgba(0,0,0,0.14);
  opacity: 0;
  pointer-events: none;
  filter: blur(1.2px) grayscale(0.22);
  transform: scale(0.72);
  z-index: 1;
}

.video-card.active {
  opacity: 1;
  pointer-events: auto;
  filter: none;
  transform: translateX(0) rotate(0deg) scale(1);
  z-index: 5;
  box-shadow: 0 20px 42px rgba(0,0,0,0.2);
}

.video-card.prev-card {
  opacity: 0.48;
  pointer-events: auto;
  transform: translateX(-245px) rotate(-5deg) scale(0.82);
  z-index: 2;
}

.video-card.next-card {
  opacity: 0.48;
  pointer-events: auto;
  transform: translateX(245px) rotate(5deg) scale(0.82);
  z-index: 2;
}

.video-card.hide-left {
  transform: translateX(-470px) rotate(-8deg) scale(0.7);
  opacity: 0;
}

.video-card.hide-right {
  transform: translateX(470px) rotate(8deg) scale(0.7);
  opacity: 0;
}

.video-thumb {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  background: #fff8ea;
}

.play-icon {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 60px;
  height: 60px;
  transform: translate(-50%, -50%);
  border-radius: 20px 8px 20px 8px;
  background: rgba(254,169,12,0.94);
  color: #fff;
  font-size: 24px;
  line-height: 60px;
  text-align: center;
  padding-left: 4px;
  font-weight: 900;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.video-card iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.slide-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 46px;
  height: 46px;
  border: 2px solid rgba(254,169,12,0.28);
  border-radius: 16px 6px 16px 6px;
  background: #fff;
  color: #fea90c;
  font-size: 34px;
  line-height: 36px;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 7px 18px rgba(0,0,0,0.08);
}

.prev {
  left: 20px;
}

.next {
  right: 20px;
}

@media (max-width: 780px) {
  .cutcat-page {
    padding: 34px 13px 46px;
  }

  .cutcat-section {
    margin-bottom: 80px;
  }

  .section-title img {
    width: 82%;
  }

  .form-box {
    padding: 24px 18px;
    border-radius: 18px;
  }

  .form-row {
    margin-bottom: 14px;
  }

  .field {
    padding: 15px;
    border-radius: 16px;
  }

  .field label {
    font-size: 14px;
  }

  .field input {
    height: 43px;
    font-size: 13px;
  }

  .choice-wrap button {
    min-height: 36px;
    font-size: 12px;
    padding: 0 13px;
  }

  .copy-btn {
    width: 100%;
    margin-left: 0;
  }

  .portfolio-box {
    min-height: 380px;
    padding: 36px 46px;
    border-radius: 12px 26px 12px 26px;
  }

  .portfolio-box:before {
    inset: 10px;
  }

  .cover-slider {
    height: 300px;
  }

  .video-card {
    width: 172px;
    height: 258px;
    border-radius: 22px 9px 22px 9px;
  }

  .video-card.prev-card {
    transform: translateX(-138px) rotate(-5deg) scale(0.78);
  }

  .video-card.next-card {
    transform: translateX(138px) rotate(5deg) scale(0.78);
  }

  .slide-btn {
    width: 38px;
    height: 38px;
    font-size: 28px;
    line-height: 30px;
  }

  .prev {
    left: 12px;
  }

  .next {
    right: 12px;
  }
}

@media (max-width: 430px) {
  .portfolio-box {
    padding: 32px 34px;
  }

  .video-card {
    width: 154px;
    height: 236px;
  }

  .video-card.prev-card {
    transform: translateX(-112px) rotate(-5deg) scale(0.74);
  }

  .video-card.next-card {
    transform: translateX(112px) rotate(5deg) scale(0.74);
  }

  .play-icon {
    width: 52px;
    height: 52px;
    line-height: 52px;
    font-size: 21px;
  }
}
</style>

<script>
const portfolioVideos = [
  "HT30gZN2Qrg",
  "9Ha-4xZaA6w",
  "WAgOGEd_LXM"
  "8yPQJYA5pnE"
];

function selectChoice(btn) {
  const wrap = btn.parentElement;
  const targetId = wrap.getAttribute("data-target");
  const etcId = wrap.getAttribute("data-etc");
  const targetInput = document.getElementById(targetId);
  const etcInput = etcId ? document.getElementById(etcId) : null;

  wrap.querySelectorAll("button").forEach(button => {
    button.classList.remove("selected");
  });

  btn.classList.add("selected");

  if (btn.innerText === "기타") {
    if (etcInput) {
      etcInput.classList.add("show");
      etcInput.focus();
      targetInput.value = etcInput.value;
    } else {
      targetInput.value = "기타";
    }
  } else {
    targetInput.value = btn.innerText;

    if (etcInput && etcInput.classList.contains("etc-input")) {
      if (etcId !== targetId) {
        etcInput.value = "";
      }
      etcInput.classList.remove("show");
    }
  }
}

document.querySelectorAll(".etc-input").forEach(input => {
  input.addEventListener("input", function() {
    const wrap = this.parentElement.querySelector(".choice-wrap");
    if (!wrap) return;

    const selectedBtn = wrap.querySelector("button.selected");
    const targetId = wrap.getAttribute("data-target");
    const targetInput = document.getElementById(targetId);

    if (selectedBtn && selectedBtn.innerText === "기타") {
      targetInput.value = this.value;
    }
  });
});

const sliderArea = document.getElementById("coverSlider");
let currentIndex = 0;
let cards = [];

function createVideoCards() {
  sliderArea.innerHTML = "";

  portfolioVideos.forEach((id, index) => {
    const card = document.createElement("div");
    card.className = "video-card";
    card.setAttribute("data-id", id);

    card.innerHTML = `
      <img class="video-thumb" src="https://i.ytimg.com/vi/${id}/hqdefault.jpg" alt="영상 ${index + 1}">
      <div class="play-icon">▶</div>
    `;

    card.addEventListener("click", function() {
      const clickedIndex = cards.indexOf(card);

      if (clickedIndex !== currentIndex) {
        currentIndex = clickedIndex;
        stopAllVideos();
        updateCards();
        return;
      }

      playVideo(card);
    });

    sliderArea.appendChild(card);
  });

  cards = Array.from(document.querySelectorAll(".video-card"));
}

function makeThumb(card) {
  const id = card.getAttribute("data-id");
  const number = cards.indexOf(card) + 1;

  card.innerHTML = `
    <img class="video-thumb" src="https://i.ytimg.com/vi/${id}/hqdefault.jpg" alt="영상 ${number}">
    <div class="play-icon">▶</div>
  `;
}

function playVideo(card) {
  const id = card.getAttribute("data-id");

  if (!card.querySelector("iframe")) {
    card.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    `;
  }
}

function stopAllVideos() {
  cards.forEach(card => {
    if (card.querySelector("iframe")) {
      makeThumb(card);
    }
  });
}

function getPosition(index) {
  const total = cards.length;
  let diff = index - currentIndex;

  if (diff > total / 2) diff -= total;
  if (diff < -total / 2) diff += total;

  return diff;
}

function updateCards() {
  cards.forEach((card, index) => {
    card.classList.remove("active", "prev-card", "next-card", "hide-left", "hide-right");

    const pos = getPosition(index);

    if (pos === 0) {
      card.classList.add("active");
    } else if (pos === -1) {
      card.classList.add("prev-card");
    } else if (pos === 1) {
      card.classList.add("next-card");
    } else if (pos < 0) {
      card.classList.add("hide-left");
    } else {
      card.classList.add("hide-right");
    }
  });
}

function moveSlide(direction) {
  if (cards.length <= 1) return;

  currentIndex += direction;

  if (currentIndex < 0) currentIndex = cards.length - 1;
  if (currentIndex >= cards.length) currentIndex = 0;

  stopAllVideos();
  updateCards();
}

sliderArea.addEventListener("wheel", function(e) {
  e.preventDefault();

  if (e.deltaY > 0 || e.deltaX > 0) {
    moveSlide(1);
  } else {
    moveSlide(-1);
  }
}, { passive: false });

let startX = 0;

sliderArea.addEventListener("touchstart", function(e) {
  startX = e.touches[0].clientX;
});

sliderArea.addEventListener("touchend", function(e) {
  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX;

  if (Math.abs(diff) > 40) {
    if (diff > 0) {
      moveSlide(1);
    } else {
      moveSlide(-1);
    }
  }
});

function getAnswer(id) {
  return document.getElementById(id).value;
}

function copyForm() {
  const text =
`1. 업로드 채널 링크
${getAnswer("q1")}

2. 영상 종류
${getAnswer("q2")}

3. 영상 주제
${getAnswer("q3")}

4. 편집점 유무
${getAnswer("q4")}

5. 영상 등장 인원수
${getAnswer("q5")}

6. 참고 영상 링크
${getAnswer("q6")}

7. 원하시는 영상 길이
${getAnswer("q7")}`;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(function() {
      alert("복사되었습니다. 문의 시 붙여넣기 해주세요.");
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "0";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand("copy");
    alert("복사되었습니다. 문의 시 붙여넣기 해주세요.");
  } catch (err) {
    alert("자동 복사가 안 되었습니다. 입력하신 내용을 직접 드래그해서 복사해주세요.");
  }

  document.body.removeChild(textarea);
}

createVideoCards();
updateCards();
</script>
