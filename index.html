<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUTCAT 상세페이지</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;
    background:#050505;
    color:#fff;
    line-height:1.65;
}

.artmug-cursor-line{
    width:100%;
    min-height:28px;
    line-height:28px;
    background:#050505;
    color:#050505;
}

.page{
    background:#050505;
    min-height:100vh;
}

.section{
    width:min(980px,calc(100% - 32px));
    margin:0 auto;
    padding:42px 0;
}

.title{
    text-align:center;
    margin-bottom:28px;
}

.title .mini{
    color:#ffd000;
    font-size:13px;
    font-weight:950;
    letter-spacing:2px;
}

.title h2{
    margin-top:8px;
    font-size:clamp(30px,5vw,54px);
    font-weight:950;
}

.title p{
    color:#aaa;
    margin-top:8px;
}

.portfolio-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
}

.shorts-box{
    border-radius:24px;
    overflow:hidden;
    background:#0d0d0d;
    border:1px solid rgba(255,208,0,.25);
}

.shorts-ratio{
    width:100%;
    aspect-ratio:9/16;
    position:relative;
    background:#111;
}

.shorts-ratio iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
}

.shorts-caption{
    padding:14px;
    color:#ffd000;
    font-weight:950;
    text-align:center;
}

.card{
    width:100%;
    border-radius:24px;
    padding:26px;
    background:#111;
    border:1px solid rgba(255,208,0,.25);
}

.form-box label{
    display:block;
    color:#ffd000;
    font-weight:950;
    margin:14px 0 7px;
}

.form-box input,
.form-box textarea{
    width:100%;
    border:1px solid rgba(255,208,0,.25);
    background:#0b0b0b;
    color:#fff;
    border-radius:14px;
    padding:15px;
    font-size:15px;
    outline:none;
}

.form-box textarea{
    min-height:86px;
    resize:vertical;
}

.copy-btn{
    width:100%;
    min-height:58px;
    margin-top:20px;
    border:0;
    border-radius:16px;
    background:#ffd000;
    color:#111;
    font-size:16px;
    font-weight:950;
    cursor:pointer;
}

.copy-result{
    display:none;
    margin-top:14px;
    padding:16px;
    border-radius:16px;
    background:rgba(255,208,0,.12);
    border:1px solid rgba(255,208,0,.38);
    color:#ffd000;
    text-align:center;
    font-weight:950;
}

@media(max-width:720px){
    .section{
        width:min(100% - 24px,980px);
        padding:32px 0;
    }

    .portfolio-grid{
        grid-template-columns:1fr;
    }

    .shorts-box{
        max-width:360px;
        width:100%;
        margin:0 auto;
    }

    .card{
        padding:22px;
    }
}
</style>
</head>

<body>

<p class="artmug-cursor-line">&nbsp;</p>

<div class="page">

<section class="section" id="portfolio">
    <div class="title">
        <div class="mini">PORTFOLIO</div>
        <h2>포트폴리오</h2>
    </div>

    <div class="portfolio-grid">
        <div class="shorts-box">
            <div class="shorts-ratio">
                <iframe src="https://www.youtube.com/embed/8yPQJYA5pnE" allowfullscreen></iframe>
            </div>
            <div class="shorts-caption">쇼츠 포트폴리오 01</div>
        </div>

        <div class="shorts-box">
            <div class="shorts-ratio">
                <iframe src="https://www.youtube.com/embed/WAgOGEd_LXM" allowfullscreen></iframe>
            </div>
            <div class="shorts-caption">쇼츠 포트폴리오 02</div>
        </div>

        <div class="shorts-box">
            <div class="shorts-ratio">
                <iframe src="https://www.youtube.com/embed/9Ha-4xZaA6w" allowfullscreen></iframe>
            </div>
            <div class="shorts-caption">쇼츠 포트폴리오 03</div>
        </div>
    </div>
</section>

<section class="section" id="form">
    <div class="title">
        <div class="mini">ORDER FORM</div>
        <h2>신청 양식</h2>
        <p>작성 후 복사하기 버튼을 누른 뒤, 아트머그 문의로 전달해주세요.</p>
    </div>

    <div class="card form-box">
        <label>1. 영상 전달 해줄 수 있는 링크</label>
        <input id="videoLink" type="text" placeholder="예: 구글드라이브, 유튜브 일부공개, 파일 링크 등">

        <label>2. 원하는 영상의 길이</label>
        <input id="videoLength" type="text" placeholder="예: 쇼츠 60초 / 쇼츠 180초 / 롱폼 5분 등">

        <label>3. 영상에 쓰일 소스 링크</label>
        <textarea id="sourceLink" placeholder="예: 인트로 영상, 아웃트로, 이미지, 로고, 일러스트, 효과음 링크 등"></textarea>

        <label>4. 업로드 예정 채널 링크</label>
        <input id="channelLink" type="text" placeholder="예: 유튜브, 치지직, 트위치, 틱톡, 인스타 등">

        <button class="copy-btn" type="button" onclick="copyOrderForm()">신청 양식 복사하기</button>

        <div id="copyResult" class="copy-result">
            복사 완료되었습니다.<br>
            이걸로 아트머그에 문의 후 신청해주세요.
        </div>
    </div>
</section>

</div>

<script>
function getOrderText(){
    const videoLink = document.getElementById("videoLink").value.trim();
    const videoLength = document.getElementById("videoLength").value.trim();
    const sourceLink = document.getElementById("sourceLink").value.trim();
    const channelLink = document.getElementById("channelLink").value.trim();

    return `1. 영상 전달 해줄 수 있는 링크
: ${videoLink}

2. 원하는 영상의 길이
: ${videoLength}

3. 영상에 쓰일 소스 링크
: ${sourceLink}

4. 업로드 예정 채널 링크
: ${channelLink}`;
}

function copyOrderForm(){
    const text = getOrderText();

    if(navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(text).then(showCopyResult);
    }else{
        const temp = document.createElement("textarea");
        temp.value = text;
        temp.style.position = "fixed";
        temp.style.left = "-9999px";
        document.body.appendChild(temp);
        temp.focus();
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        showCopyResult();
    }
}

function showCopyResult(){
    const result = document.getElementById("copyResult");
    result.style.display = "block";
    setTimeout(function(){
        result.style.display = "none";
    },3500);
}
</script>

</body>
</html>
